name: 공기업 가산점 분기별 크롤링

on:
  # 분기별 자동 실행: 1월·4월·7월·10월 1일 새벽 2시 (UTC 기준 = KST 11시)
  schedule:
    - cron: "0 17 1 1,4,7,10 *"   # UTC 17:00 = KST 02:00 다음날

  # 수동 실행 (GitHub Actions 탭에서 "Run workflow" 클릭)
  workflow_dispatch:
    inputs:
      enterprise:
        description: "특정 기관명 (비워두면 전체)"
        required: false
        default: ""
      overwrite:
        description: "기존 규칙 덮어쓰기"
        type: boolean
        default: false
      dry_run:
        description: "드라이런 (DB 저장 안 함)"
        type: boolean
        default: false

jobs:
  crawl:
    name: 가산점 DB 수집
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: 의존성 설치
        run: |
          cd crawler
          pip install -r requirements.txt

      - name: 환경 변수 파일 생성
        run: |
          cd crawler
          cat > .env << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATA_GO_KR_API_KEY=${{ secrets.DATA_GO_KR_API_KEY }}
          CRAWL_DELAY_SECONDS=2
          LOG_LEVEL=INFO
          EOF

      - name: 크롤러 실행
        run: |
          cd crawler
          ARGS=""
          if [ -n "${{ github.event.inputs.enterprise }}" ]; then
            ARGS="$ARGS --enterprise '${{ github.event.inputs.enterprise }}'"
          fi
          if [ "${{ github.event.inputs.overwrite }}" = "true" ]; then
            ARGS="$ARGS --overwrite"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py run $ARGS

      - name: 실행 결과 슬랙 알림 (선택)
        if: always()
        continue-on-error: true
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          echo "${EMOJI} 크롤링 ${STATUS}: $(date '+%Y-%m-%d %H:%M KST')"
          # Slack webhook이 설정된 경우 알림 전송
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-type: application/json" \
              -d "{\"text\":\"${EMOJI} 공기업 가산점 크롤링 ${STATUS}\"}"
          fi
